<div class="success-page">
  <div class="mx-auto max-w-md px-6 py-24 text-center">
    
    <!-- Animated Checkmark -->
    <div class="mx-auto flex h-24 w-24 items-center justify-center rounded-full bg-green-50 dark:bg-green-950/20 text-green-500 mb-8 border border-green-200/50">
      <svg class="h-12 w-12 stroke-current animate-checkmark" fill="none" viewBox="0 0 24 24" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
    </div>

    <!-- Success Message -->
    <h1 class="text-3xl font-black tracking-tight text-slate-900 dark:text-white sm:text-4xl">Order Successful!</h1>
    <p class="text-slate-500 mt-3 text-sm">Thank you for your purchase. We are processing your delivery details.</p>

    <!-- Details Box -->
    @if (orderId()) {
      <div class="mt-8 rounded-2xl border border-black/10 bg-slate-50 dark:border-white/10 dark:bg-slate-950 p-4">
        <span class="block text-xs font-bold text-slate-400 uppercase tracking-wider">Order Reference ID</span>
        <span class="block text-base font-mono font-black text-[var(--color-brand)] mt-1 select-all">{{ orderId() }}</span>
      </div>
    }

    <!-- CTA Buttons -->
    <div class="mt-10 flex flex-col gap-3">
      <a routerLink="/products" class="w-full rounded-2xl bg-[var(--color-brand)] py-4 text-sm font-bold text-white shadow-lg shadow-orange-400/25 transition hover:opacity-90">Continue Shopping</a>
      <a routerLink="/profile" class="text-xs font-bold text-slate-450 hover:text-[var(--color-brand)] transition">View My Orders</a>
    </div>

  </div>
</div>
